# Flutter/Android specific settings
android.useAndroidX=true
android.enableJetifier=true
org.gradle.jvmargs=-Xmx3g -XX:TieredStopAtLevel=0 -XX:-UseCompressedOops -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.daemon=true
android.injected.build.abi=arm64-v8a
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=false
android.injected.testOnly=false
android.extractNativeLibs=true
android.privately.disable-symbol-stripping=true